<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Jellyfin Podcasts</title>
</head>
<body>
    <div id="PodcastsConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-button">
        <div data-role="content">
            <div class="content-primary">
                <style>
                    #PodcastsConfigPage .podcastsCard {
                        background: rgba(255, 255, 255, 0.03);
                        border: 1px solid rgba(255, 255, 255, 0.08);
                        border-radius: 14px;
                        margin-bottom: 1.5em;
                        padding: 1.25em;
                    }

                    #PodcastsConfigPage .podcastsMuted {
                        opacity: 0.75;
                    }

                    #PodcastsConfigPage code {
                        overflow-wrap: anywhere;
                    }
                </style>

                <div class="verticalSection">
                    <h1>Jellyfin Podcasts</h1>
                    <p class="podcastsMuted">Podcast subscriptions are managed from the user-facing podcasts page.</p>
                </div>

                <div class="podcastsCard">
                    <h2>Open Podcasts</h2>
                    <p>Use the button below to open the podcasts page inside the Jellyfin web app.</p>
                    <div>
                        <button id="OpenPodcastsPageButton" is="emby-button" type="button" class="raised button-submit">
                            <span>Open Podcasts</span>
                        </button>
                    </div>
                </div>

                <div class="podcastsCard">
                    <h2>Direct URL</h2>
                    <p class="podcastsMuted">If the sidebar link is not visible, signed-in users can open podcasts directly at:</p>
                    <code id="PodcastsDirectUrl"></code>
                </div>
            </div>
        </div>
        <script type="text/javascript">
            (function () {
                var directRoute = '/web/podcasts';

                document.querySelector('#PodcastsDirectUrl').textContent = window.location.origin + directRoute;
                document.querySelector('#OpenPodcastsPageButton')
                    .addEventListener('click', function () {
                        window.location.href = directRoute;
                    });
            })();
        </script>
    </div>
</body>
</html>
